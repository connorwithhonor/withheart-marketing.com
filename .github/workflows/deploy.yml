name: Deploy to Netlify

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      skip_safety_check:
        description: "Skip the anti-wipe safety check (DANGEROUS — only if you know you're removing content)"
        required: false
        default: "false"

concurrency:
  group: deploy-production
  cancel-in-progress: false  # never cancel a deploy mid-flight

# Opt into Node 24 for all actions/* — Node 20 is deprecated effective 2026-06-02.
# Keeps actions/checkout@v4 and actions/setup-node@v4 running on modern Node
# without forcing version bumps that might have other compatibility issues.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  safety-check:
    name: Anti-wipe safety check
    runs-on: ubuntu-latest
    if: github.event.inputs.skip_safety_check != 'true'
    outputs:
      ok: ${{ steps.guard.outputs.ok }}
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Fetch current live manifest
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
        run: |
          # Get current production deploy id, then its file list
          current_deploy=$(curl -sS -H "Authorization: Bearer $NETLIFY_AUTH_TOKEN" \
            "https://api.netlify.com/api/v1/sites/$NETLIFY_SITE_ID" \
            | python3 -c "import json,sys; print(json.load(sys.stdin).get('published_deploy',{}).get('id',''))")
          if [ -z "$current_deploy" ]; then
            echo "Could not fetch current deploy id. Aborting for safety."
            exit 1
          fi
          echo "current_deploy=$current_deploy"
          curl -sS -H "Authorization: Bearer $NETLIFY_AUTH_TOKEN" \
            "https://api.netlify.com/api/v1/deploys/$current_deploy/files" \
            | python3 -c "import json,sys; [print(x['path']) for x in json.load(sys.stdin)]" \
            | sort > live-manifest.txt
          echo "Live file count: $(wc -l < live-manifest.txt)"

      - name: Build new manifest from repo
        run: |
          # List repo files matching what Netlify would publish (root publish dir)
          find . -type f \
            -not -path './.git/*' \
            -not -path './.github/*' \
            -not -path './scripts/*' \
            -not -name 'CLAUDE.md' \
            -not -name 'README*' \
            | sed 's|^\./|/|' | sort > new-manifest.txt
          echo "New file count: $(wc -l < new-manifest.txt)"

      - name: Anti-wipe guard
        id: guard
        run: |
          live_count=$(wc -l < live-manifest.txt)
          new_count=$(wc -l < new-manifest.txt)
          threshold=$((live_count * 80 / 100))

          # Hard rule: never drop file count below 80% of live without manual override
          if [ "$new_count" -lt "$threshold" ]; then
            echo "::error::ANTI-WIPE GUARD TRIPPED: new deploy would have $new_count files, current live has $live_count (threshold: $threshold)."
            echo "::error::If this is intentional, re-run with skip_safety_check=true."
            exit 1
          fi

          # Show what would be removed (for human review in the action log)
          echo "## Files in live but NOT in new deploy (would be removed)"
          comm -23 live-manifest.txt new-manifest.txt | tee removed.txt
          removed_count=$(wc -l < removed.txt)

          # Allow up to 3 removals silently. More than 3 requires explicit "remove:" in commit msg.
          if [ "$removed_count" -gt 3 ]; then
            commit_msg=$(git log -1 --pretty=%B)
            if ! echo "$commit_msg" | grep -qi "^remove:"; then
              echo "::error::Deploy would remove $removed_count files. Commit must start with 'remove:' to authorize. Aborting."
              exit 1
            fi
          fi

          # Critical files: /index.html is always required (no homepage = broken site).
          # Other "expected" files (blog/index.html, sitemap.xml, robots.txt) are required
          # ONLY if they're already in the live deploy — we never silently drop them.
          if ! grep -qx "/index.html" new-manifest.txt; then
            echo "::error::Required file missing from deploy: /index.html (no homepage)"
            exit 1
          fi
          for soft_required in /blog/index.html /sitemap.xml /robots.txt; do
            if grep -qx "$soft_required" live-manifest.txt && ! grep -qx "$soft_required" new-manifest.txt; then
              commit_msg=$(git log -1 --pretty=%B)
              if ! echo "$commit_msg" | grep -qi "^remove:"; then
                echo "::error::Live has $soft_required but new deploy does not. Commit must start with 'remove:' to authorize dropping it."
                exit 1
              fi
            fi
          done

          echo "ok=true" >> "$GITHUB_OUTPUT"
          echo "Safety check passed: $new_count files, removing $removed_count."

      - name: Content-corruption guard
        run: |
          # Lesson from the 2026-05-21 5-site wipe incident:
          # Old "Netlify sync backup" scripts captured Netlify deploy-file API
          # metadata JSON as if it were file content. When those repos got
          # deployed, sites went down (serving 215-byte JSON instead of HTML).
          # This step prevents that exact pattern from ever reaching production.
          #
          # See claude-memory/broken-repos-wipe-incident-2026-05-21.md.

          corrupt_count=0
          corrupt_files=""
          while IFS= read -r path; do
            path="${path#/}"
            [ -z "$path" ] && continue
            [ ! -f "$path" ] && continue
            # The corruption signature: file starts with {"id":"/ and contains "deploy_id"
            # in the first 300 bytes. This is the response shape from
            # GET /api/v1/deploys/{deploy_id}/files/{path}.
            head_bytes=$(head -c 300 "$path" 2>/dev/null)
            if echo "$head_bytes" | grep -q '^{"id":"/' && echo "$head_bytes" | grep -q '"deploy_id"'; then
              echo "::error::Corrupt content (Netlify API JSON metadata) detected in: /$path"
              corrupt_count=$((corrupt_count + 1))
              corrupt_files="$corrupt_files /$path"
            fi
          done < new-manifest.txt

          if [ "$corrupt_count" -gt 0 ]; then
            echo "::error::$corrupt_count file(s) contain JSON metadata instead of real content. Aborting before deploy."
            echo "::error::Files: $corrupt_files"
            echo "::error::To fix: re-fetch the affected files from https://{deploy_id}--{site_name}.netlify.app/{path}"
            echo "::error::See claude-memory/broken-repos-wipe-incident-2026-05-21.md"
            exit 1
          fi

          # Homepage must look like HTML
          if [ -f index.html ]; then
            size=$(wc -c < index.html)
            if [ "$size" -lt 500 ]; then
              echo "::error::index.html is only $size bytes — suspiciously small. Aborting."
              exit 1
            fi
            if ! head -c 200 index.html | grep -qiE '^<(!DOCTYPE|html| *!doctype)'; then
              echo "::error::index.html does not look like HTML (no DOCTYPE/html tag in first 200 bytes). Aborting."
              echo "::error::First 100 bytes:"
              head -c 100 index.html
              exit 1
            fi
            echo "  /index.html content sanity: PASS ($size bytes, HTML)"
          fi

          echo "Content guard passed."

  deploy:
    name: Deploy to Netlify production
    runs-on: ubuntu-latest
    needs: safety-check
    if: always() && (needs.safety-check.result == 'success' || github.event.inputs.skip_safety_check == 'true')
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Netlify CLI
        run: npm install -g netlify-cli@latest

      - name: Deploy to production
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
        run: |
          # Exclude internal files from publish via .netlifyignore
          cat > .netlifyignore <<'EOF'
          CLAUDE.md
          README.md
          .github/
          scripts/
          EOF
          # --no-build: skip Netlify's site-level build commands. We're deploying
          # the repo contents as-is. Any build a site needs should be done in CI
          # before this step (or via netlify.toml [build] command).
          # Use only the commit SHA + first line of message — full multi-line
          # messages break the shell argument because of embedded newlines.
          deploy_msg="git $(echo '${{ github.sha }}' | cut -c1-7) — $(git log -1 --pretty=%s)"
          netlify deploy --dir=. --prod --no-build --message="$deploy_msg"

      - name: Verify deploy is live
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
        run: |
          # Confirm the deploy is reachable. Always check the homepage.
          # Additional URLs can be configured per-site via VERIFY_URLS env var
          # (newline-separated, full URLs). If not set, only homepage is checked.
          sleep 10
          site_info=$(curl -sS -H "Authorization: Bearer $NETLIFY_AUTH_TOKEN" \
            "https://api.netlify.com/api/v1/sites/$NETLIFY_SITE_ID")
          homepage_url=$(echo "$site_info" | python3 -c "import json,sys; d=json.load(sys.stdin); print(d.get('ssl_url') or d.get('url') or '')")
          if [ -z "$homepage_url" ]; then
            echo "::error::Could not determine site URL from Netlify API"
            exit 1
          fi
          # Build list of URLs to check (one per line)
          {
            echo "$homepage_url/"
            if [ -n "${VERIFY_URLS:-}" ]; then
              printf "%s\n" "$VERIFY_URLS"
            fi
          } > /tmp/verify-urls.txt
          while IFS= read -r url; do
            [ -z "$url" ] && continue
            status=$(curl -sIo /dev/null -w "%{http_code}" "$url")
            if ! echo "$status" | grep -qE '^(200|301|302|304)$'; then
              echo "::error::Post-deploy verification failed: $url returned $status"
              exit 1
            fi
            echo "  OK $url -> $status"
          done < /tmp/verify-urls.txt
